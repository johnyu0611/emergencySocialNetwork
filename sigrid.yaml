languages:
  - name: javascript
    production:
      include: [".*[.]mjs"]
      exclude: [".*[.]test[.]mjs"]
    test:
      include: [".*[.]test[.]mjs"]
  - name: html
  - name: css
components:
  - name: Frontend
    include:
      - ".*/public/.*"
  - name: Backend
    include:
      - ".*/src/.*"
dependencychecker:
  blocklist: ["NONE"]
thirdpartyfindings:
  enabled: true
