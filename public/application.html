<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="asset/sos-icon.png" rel="icon" type="image/x-icon" />
    <title>Application Directory</title>
    <link href="common/common.css" rel="stylesheet" />
    <link href="directory.css" rel="stylesheet" />

    <script src="common/common.mjs" type="module"></script>
    <script src="application.mjs" type="module"></script>
  </head>
  <body>
    <div class="background"></div>
    <div class="alert" id="banner" role="banner"></div>
    <div id="container">
      <!-- Navigation Bar -->
      <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">ESN Directory</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a
                  class="nav-link active"
                  aria-current="page"
                  href="directory.html"
                >
                  ESN Directory
                </a>
              </li>
              <li class="nav-item fs-6">
                <a
                  class="nav-link active"
                  aria-current="page"
                  href="#"
                  id="share-status"
                >
                  MyStatus
                </a>
              </li>
              <li class="nav-item fs-6">
                <a
                  class="nav-link"
                  href="chat.html?roomId=00000000-0000-0000-0000-000000000000"
                >
                  Public Chatroom
                </a>
              </li>
              <li class="nav-item fs-6">
                <a
                  class="nav-link"
                  href="chat.html?roomId=11111111-1111-1111-1111-111111111111"
                >
                  Announcements
                </a>
              </li>
              <li class="nav-item fs-6">
                <a class="nav-link" href="resource-directory.html">
                  Post Resources
                </a>
              </li>
              <li class="nav-item fs-6">
                <a class="nav-link" href="application.html"> Applications </a>
              </li>
              <li class="nav-item dropdown">
                <a
                  class="nav-link dropdown-toggle"
                  role="button"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                >
                  Site Administration
                </a>
                <ul class="dropdown-menu">
                  <li>
                    <a class="dropdown-item" href="performance-test.html"
                      >Performance Test</a
                    >
                  </li>
                </ul>
              </li>
            </ul>
            <form class="d-flex" role="search">
              <button
                class="btn btn-outline-success me-2"
                type="submit"
                id="button-search"
              >
                Search
              </button>
              <button
                class="btn btn-outline-danger"
                id="button-logout"
                type="button"
              >
                <span>Logout</span>
              </button>
            </form>
          </div>
        </div>
      </nav>

      <!-- Main Content -->
      <div class="container" id="main-container">
        <div class="container" id="application-container">
          <div class="row">
            <div class="col-12 col-md-6 offset-md-3">
              <div class="card mb-4">
                <div class="card-header text-center">
                  <h2>Your Applications</h2>
                </div>
                <div class="card-body scrollable-list">
                  <ul class="list-group" id="application-list">
                    <!-- Applications will be dynamically inserted here -->
                  </ul>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
