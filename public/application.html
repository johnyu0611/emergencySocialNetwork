<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="asset/sos-icon.png" rel="icon" type="image/x-icon" />
    <title>Application Directory</title>
    <link href="common/common.css" rel="stylesheet" />
    <link href="directory.css" rel="stylesheet" />

    <script src="common/common.mjs" type="module"></script>
    <script src="application.mjs" type="module"></script>
  </head>
  <body>
    <div class="background"></div>
    <div class="alert" id="banner" role="banner"></div>
    <div id="container">
      <!-- Navigation Bar -->
      <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">My Applications</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a
                  class="nav-link active"
                  aria-current="page"
                  href="directory.html"
                >
                  ESN Directory
                </a>
              </li>
            </ul>
          </div>
        </div>
      </nav>

      <!-- Main Content -->
      <div class="container" id="main-container">
        <div class="container" id="application-container">
          <div class="row">
            <div class="col-12 col-md-6 offset-md-3">
              <div class="card mb-4">
                <div class="card-header text-center">
                  <h2>Your Applications</h2>
                </div>
                <div class="card-body scrollable-list">
                  <ul class="list-group" id="application-list">
                    <!-- Applications will be dynamically inserted here -->
                  </ul>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
