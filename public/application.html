<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="asset/sos-icon.png" rel="icon" type="image/x-icon" />
    <title>Application Directory</title>
    <link href="common/common.css" rel="stylesheet" />
    <script src="common/common.mjs" type="module"></script>
    <link href="directory.css" rel="stylesheet" />
    <link href="application.css" rel="stylesheet" />
    <script src="application.mjs" type="module"></script>
  </head>
  <body>
    <div class="background"></div>
    <div class="alert" id="banner" role="banner"></div>
    <nav
      class="navbar navbar-expand-lg navbar-light bg-light position-absolute top-0"
    >
      <div class="container-fluid">
        <a class="navbar-brand" href="#">My Applications</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a
                class="nav-link active"
                aria-current="page"
                href="directory.html"
              >
                ESN Directory
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="container" id="container">
      <div class="card mb-4" id="application-container">
        <div class="card-header text-center">
          <h2>Your Applications</h2>
        </div>
        <div class="card-body scrollable-list">
          <ul class="list-group" id="application-list">
            <!-- Applications will be dynamically inserted here -->
          </ul>
        </div>
      </div>
    </div>
  </body>
</html>
