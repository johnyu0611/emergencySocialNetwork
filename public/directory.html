<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link href="asset/sos-icon.png" rel="icon" type="image/x-icon" />
    <title>ESN Directory</title>
    <link href="common/common.css" rel="stylesheet" />
    <script src="common/common.mjs" type="module"></script>
    <link href="directory.css" rel="stylesheet" />
    <script src="directory.mjs" type="module"></script>
  </head>
  <body>
    <div class="background"></div>
    <div class="alert" id="banner" role="banner"></div>
    <div id="container">
      <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">ESN Directory</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#"
                  >ESN Directory</a
                >
              </li>

              <li class="nav-ite fs-6">
                <a
                  aria-current="page"
                  class="nav-link active"
                  href="#"
                  id="share-status"
                >
                  <i
                    class="fa-solid fa-circle-exclamation"
                    style="color: rgb(241, 107, 10)"
                  ></i>
                  MyStatus
                </a>
              </li>

              <li class="nav-item fs-6">
                <a
                  class="nav-link"
                  href="chat.html?roomId=00000000-0000-0000-0000-000000000000"
                  >Public Chatroom</a
                >
              </li>
              <li class="nav-item dropdown">
                <a
                  class="nav-link dropdown-toggle"
                  role="button"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                >
                  Site Administration
                </a>
                <ul class="dropdown-menu">
                  <li>
                    <a class="dropdown-item" href="performance-test.html"
                      >Performance Test</a
                    >
                  </li>
                  <!--                  <li><a class="dropdown-item" href="#">Another action</a></li>-->
                  <!--                  <li><hr class="dropdown-divider"></li>-->
                  <!--                  <li><a class="dropdown-item" href="#">Something else here</a></li>-->
                </ul>
              </li>
            </ul>
            <form class="d-flex" role="search">
              <input
                class="form-control me-2"
                type="search"
                placeholder="Search"
                aria-label="Search"
              />
              <button class="btn btn-outline-success me-2" type="submit">
                Search
              </button>
              <button
                class="btn btn-outline-danger"
                id="button-logout"
                type="button"
              >
                <span>Logout</span>
              </button>
            </form>
          </div>
        </div>
      </nav>

      <div class="container" id="main-container">
        <div class="container" id="user-directory-container">
          <div class="row">
            <div class="col-12 col-md-6 offset-md-3">
              <div class="card mb-4">
                <div class="card-header text-center">
                  <h2>ESN Directory</h2>
                </div>
                <div class="card-body scrollable-list">
                  <ul class="list-group" id="user-list">
                    <!-- Users will be inserted here dynamically -->
                  </ul>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="modal-status"
      tabindex="-1"
      aria-labelledby="modalStatusLabel"
      aria-hidden="true"
      data-bs-backdrop="static"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalStatusLabel">
              Select Your Status
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <p>What is your current status?</p>
            <div class="d-grid gap-2">
              <button
                type="button"
                class="btn btn-success status-btn"
                data-status="OK"
              >
                <i class="fa-solid fa-circle-check"></i> I am OK
              </button>
              <button
                type="button"
                class="btn btn-warning status-btn"
                data-status="Help"
              >
                <i class="fa-solid fa-circle-exclamation"></i> I Need Help
              </button>
              <button
                type="button"
                class="btn btn-danger status-btn"
                data-status="Emergency"
              >
                <i class="fa-solid fa-triangle-exclamation"></i> Emergency
              </button>
            </div>
          </div>

          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
