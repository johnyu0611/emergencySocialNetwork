<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link href="asset/sos-icon.png" rel="icon" type="image/x-icon" />
    <title>ESN Chat</title>
    <link href="common/common.css" rel="stylesheet" />
    <script src="common/common.mjs" type="module"></script>
    <link href="chat.css" rel="stylesheet" />
    <script src="chat.mjs" type="module"></script>
  </head>
  <body>
    <div id="container">
      <div class="alert" id="banner" role="banner"></div>
      <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
          <!-- <span class="navbar-text me-3" id="announcement-text">Announcement Space</span> -->
          <a class="navbar-brand" href="#" id="announcement-text"
            >Announcement Space</a
          >

          <img
            alt="Logo"
            class="align-text-top"
            height="30"
            src="asset/sos.gif"
            width="30"
            data-bs-toggle="offcanvas"
            data-bs-target="#offcanvasChatList"
            aria-controls="offcanvasChatList"
            id="get-chatrooms"
          />
          <a class="navbar-brand" id="chatroom-title"></a>
          <button
            class="btn btn-outline-primary btn-sm"
            id="button-directoty"
            type="button"
            onclick="location.href='directory.html'"
          >
            <span>Directory</span>
          </button>

          <form class="d-flex" role="search">
            <button
              class="btn btn-outline-success me-2"
              type="submit"
              id="button-search"
            >
              Search
            </button>

            <button
              class="btn btn-outline-danger btn-sm"
              id="button-logout"
              type="button"
            >
              <span>Logout</span>
              <i class="fas fa-sign-out-alt"></i>
            </button>
          </form>
        </div>
      </nav>

      <div
        class="offcanvas offcanvas-start"
        tabindex="-1"
        id="offcanvasChatList"
        aria-labelledby="offcanvasChatListLabel"
      >
        <div class="offcanvas-header">
          <h5 class="offcanvas-title" id="offcanvasChatListLabel">Chat Room</h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="offcanvas"
            aria-label="Close"
          ></button>
        </div>
        <div class="offcanvas-body">
          <ul class="nav nav-pills flex-column" id="chat-list" role="tablist">
            <div class="chatroom-container" id="chat-room-container"></div>
          </ul>
        </div>
      </div>

      <div class="container" id="chat-history-container">
        <!-- Chat messages will be appended here -->
      </div>
      <div class="container" id="input-area">
        <label class="form-label" for="input-box"></label>
        <textarea
          class="form-control"
          id="input-box"
          placeholder="Type your message..."
        ></textarea>
        <button
          class="btn btn-primary color-white"
          id="button-post"
          type="button"
        >
          <i class="fa fa-paper-plane" id="button-post-icon"></i>
        </button>
      </div>
    </div>

    <div id="modal-container"></div>
    <script>
      fetch("modal-announcement.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("modal-container").innerHTML = data;
        })
        .catch((error) => console.error("Error loading modal:", error));
    </script>

    <div
      class="modal fade"
      id="modal-search"
      tabindex="-1"
      aria-labelledby="modalSearchLabel"
      aria-hidden="true"
      data-bs-backdrop="static"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalStatusLabel">Search</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>

          <div class="modal-body">
            <div class="btn-group mb-3" role="group">
              <input
                type="radio"
                class="btn-check"
                name="searchOption"
                id="userOption"
                value="user"
                checked
              />
              <label class="btn btn-outline-primary" for="userOption"
                >User</label
              >

              <input
                type="radio"
                class="btn-check"
                name="searchOption"
                id="statusOption"
                value="status"
              />
              <label class="btn btn-outline-primary" for="statusOption"
                >Status</label
              >

              <input
                type="radio"
                class="btn-check"
                name="searchOption"
                id="messageOption"
                value="message"
              />
              <label class="btn btn-outline-primary" for="messageOption"
                >Message</label
              >
            </div>

            <div class="input-group">
              <input
                type="text"
                id="searchInput"
                class="form-control"
                placeholder="Enter search query..."
                aria-label="Search bar"
              />
              <button
                class="btn btn-primary"
                type="button"
                id="perform-search-button"
              >
                Search
              </button>
            </div>
          </div>

          <div
            id="searchResults"
            class="mt-3"
            style="max-height: 400px; overflow-y: auto"
          ></div>

          <div class="modal-footer">
            <button
              id="loadMoreButton"
              type="button"
              class="btn btn-primary"
              style="display: none"
            >
              Load More
            </button>

            <button
              class="btn btn-outline-danger"
              id="stop-search-button"
              type="button"
              class="btn btn-secondary"
            >
              StopSearch
            </button>

            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
