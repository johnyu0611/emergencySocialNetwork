<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link href="asset/sos-icon.png" rel="icon" type="image/x-icon" />
    <title>Review</title>
    <link href="common/common.css" rel="stylesheet" />
    <script src="common/common.mjs" type="module"></script>
    <link href="medicalmap.css" rel="stylesheet" />
    <link href="review.css" rel="stylesheet" />
    <script src="review-ob.mjs" type="module"></script>
  </head>
  <body>
    <div class="background"></div>
    <div class="alert" id="banner" role="banner"></div>
    <div id="container">
      <div class="alert" id="banner" role="banner"></div>
      <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
          <img
            alt="Logo"
            class="align-text-top"
            height="30"
            src="asset/sos.gif"
            width="30"
          />
          <a class="navbar-brand" id="title">Temporal Medical Center</a>
          <button
            class="btn btn-outline-primary btn-sm"
            id="button-directoty"
            type="button"
            onclick="location.href='medicamap.html'"
          >
            <i class="fa-solid fa-map"></i>
          </button>

          <button
            class="btn btn-outline-success btn-sm"
            id="button-create"
            type="button"
            data-bs-toggle="modal"
            data-bs-target="#addressModal"
          >
            <i class="fa-solid fa-plus"></i>
          </button>
        </div>
      </nav>

      <div class="description">
        <hr />
        <div class="rate">
          <h4>Star Rating</h4>
          <div id="rate-star"></div>
        </div>
        <hr />
        <div>
          <h4>Introduction</h4>
          <p id="intro"></p>
        </div>
        <hr />
        <div>
          <h4>Location</h4>
          <p id="loca"></p>
        </div>
      </div>

      <div id="data-list-container" class="list">
        <h4>Reviews</h4>
        <ul id="data-list"></ul>
      </div>
    </div>

    <div
      class="modal fade"
      id="addressModal"
      tabindex="-1"
      aria-labelledby="addressModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="addressModalLabel">Review Form</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form id="address-form" action="" method="get" autocomplete="off">
              <p class="note" id="note"><em>* = required field</em></p>
              <div class="rating">
                <input type="radio" id="star5" name="rating" value="5" />
                <label
                  class="star"
                  for="star5"
                  title="Awesome"
                  aria-hidden="true"
                ></label>
                <input type="radio" id="star4" name="rating" value="4" />
                <label
                  class="star"
                  for="star4"
                  title="Great"
                  aria-hidden="true"
                ></label>
                <input type="radio" id="star3" name="rating" value="3" />
                <label
                  class="star"
                  for="star3"
                  title="Very good"
                  aria-hidden="true"
                ></label>
                <input type="radio" id="star2" name="rating" value="2" />
                <label
                  class="star"
                  for="star2"
                  title="Good"
                  aria-hidden="true"
                ></label>
                <input type="radio" id="star1" name="rating" value="1" />
                <label
                  class="star"
                  for="star1"
                  title="Bad"
                  aria-hidden="true"
                ></label>
              </div>
              <label class="form-label">
                Content*
                <textarea
                  class="form-control"
                  rows="4"
                  cols="50"
                  tabindex="0"
                  id="content"
                  required
                ></textarea>
              </label>
              <div class="mt-3">
                <button type="button" class="btn btn-primary" id="save-address">
                  Save Review
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <div id="modal-announcement-container"></div>
  </body>
</html>
