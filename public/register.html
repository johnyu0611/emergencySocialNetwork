<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link href="asset/sos-icon.png" rel="icon" />
    <title>Join ESN Community</title>
    <link href="common/common.css" rel="stylesheet" />
    <script src="common/common.mjs" type="module"></script>
    <link href="register.css" rel="stylesheet" />
    <script src="register.mjs" type="module"></script>
  </head>
  <body>
    <div class="background"></div>
    <i class="fa fa-home" id="home" onclick="location.href='index.html'"></i>
    <div
      class="container d-flex flex-column align-items-center justify-content-between"
    >
      <img alt="SOS Logo" draggable="false" id="logo" src="asset/sos.gif" />
      <h3 class="mt-2 mb-4">Join the ESN Community</h3>
      <form class="w-100" id="form" novalidate>
        <div class="mb-3">
          <label class="form-label" for="input-username">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fa fa-user"></i></span>
            <input
              class="form-control"
              id="input-username"
              placeholder="Enter username"
              type="text"
            />
          </div>
          <div class="invalid-feedback"></div>
        </div>
        <div class="mb-3">
          <label class="form-label" for="input-password">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fa fa-lock"></i></span>
            <input
              class="form-control"
              id="input-password"
              placeholder="Enter password"
              type="password"
            />
          </div>
          <div class="invalid-feedback" id="invalid-feedback-password"></div>
        </div>
        <div class="mt-4 d-grid">
          <button class="btn btn-primary" type="submit">Join</button>
        </div>
      </form>
    </div>

    <div
      aria-hidden="true"
      aria-labelledby="exampleModalLabel"
      class="modal fade"
      data-bs-backdrop="static"
      id="modal-confirm-join"
      tabindex="-1"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5">Create a New User</h1>
            <button
              aria-label="Close"
              class="btn-close"
              data-bs-dismiss="modal"
              type="button"
            ></button>
          </div>
          <div class="modal-body">Confirm to create a new user?</div>
          <div class="modal-footer">
            <button
              class="btn btn-secondary"
              data-bs-dismiss="modal"
              id="modal-confirm-join-btn-cancel"
              type="button"
            >
              No
            </button>
            <button
              class="btn btn-primary"
              id="modal-confirm-join-btn-confirm"
              type="button"
            >
              Yes
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      aria-hidden="true"
      aria-labelledby="exampleModalLabel"
      class="modal fade"
      data-bs-backdrop="static"
      id="modal-welcome"
      tabindex="-1"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="modal-welcome-title">
              Welcome to the Community!
            </h1>
          </div>
          <div class="modal-body">
            <h2>Status Indicators:</h2>
            <div>
              <img alt="OK" class="icon" draggable="false" src="asset/ok.jpg" />
              <p>OK: I do not need help</p>
            </div>
            <div>
              <img
                alt="Help"
                class="icon"
                draggable="false"
                src="asset/help.jpg"
              />
              <p>Help: I need help (but not a life-threatening emergency)</p>
            </div>
            <div>
              <img
                alt="Emergency"
                class="icon"
                draggable="false"
                src="asset/emergency.jpg"
              />
              <p>
                Emergency: I need help NOW - it is a life-threatening emergency!
              </p>
            </div>
          </div>
          <div class="modal-footer">
            <button
              class="btn btn-primary btn-success"
              id="modal-welcome-btn-confirm"
              type="button"
            >
              Yes, I understand!
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="alert" id="banner" role="banner"></div>
  </body>
</html>
