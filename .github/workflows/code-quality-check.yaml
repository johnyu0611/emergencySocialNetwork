name: Code Quality Check
on:
  pull_request:

jobs:
  code-quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checking Out Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Checking if .env exists
        run: |
          if [ -f .env ]; then
             echo ".env found. Please remove it before push."
             exit 1
          fi
      - name: Setting Up Node.js Environment
        uses: actions/setup-node@v4.1.0
        with:
          node-version: 20
      - name: Installing Dependencies
        run: |
          npm ci
      - name: Checking Code Style
        run: |
          npm run ci-check-code-style
      - name: Running Linter
        run: |
          npm run ci-lint
      - name: Running Tests
        run: |
          npm run ci-test
